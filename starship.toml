"$schema" = 'https://starship.rs/config-schema.json'

# Insert a blank line between shell prompts
add_newline = false

# Prompt layout modeled after screenshot:
# line 1: path + branch + git state (left), duration + node (right)
# line 2: git identity on the right
# line 3: prompt character
format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$line_break\
$character"""

right_format = """
$cmd_duration\
$nodejs\
$python\
$ruby\
${custom.flutter}\
$dart\
$golang\
$rust\
$java\
$php\
$kotlin\
$swift\
$line_break\
${custom.git_user}\
"""

[character]
success_symbol = "[❯](bold fg:#A6E3A1)"
error_symbol = "[❯](bold fg:#F7768E)"
vimcmd_symbol = "[❮](bold fg:#E0AF68)"

[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = ".../"
style = "bold fg:#00F5FF"
format = "[ $path]($style) "
# Show a lock icon if the directory is read-only
read_only = " 󰌾"

[git_branch]
symbol = " "
truncation_length = 24
truncation_symbol = "..."
style = "bold fg:#FFFFFF bg:#8A2BE2"
format = "[](fg:#8A2BE2)[ $symbol$branch ]($style)[](fg:#8A2BE2) "

[git_status]
style = "bold fg:#F28FAD"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡$count"
behind = "⇣$count"

[git_metrics]
disabled = false
added_style = "bold fg:#8BD5A0"
deleted_style = "bold fg:#F7768E"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[custom.git_user]
command = "git config user.email | sed 's/\\.git_user$//' || git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ $output]($style)"
style = "bold fg:#D7DBE8"

[cmd_duration]
min_time = 1
style = "bold fg:#D7DBE8"
format = "[◷ $duration]($style) "

[nodejs]
symbol = " "
format = "[via $symbol$version]($style)"
style = "bold fg:#E6D489"
version_format = "v${raw}"

[python]
symbol = " "
style = "bold fg:#8BD5A0"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[ruby]
symbol = " "
style = "bold fg:#F7768E"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[dart]
symbol = " "
style = "bold fg:#7DCFFF"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[golang]
symbol = " "
style = "bold fg:#7DCFFF"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[rust]
symbol = " "
style = "bold fg:#E0AF68"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[java]
symbol = " "
style = "bold fg:#F7768E"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[php]
symbol = " "
style = "bold fg:#C0CAF5"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[kotlin]
symbol = " "
style = "bold fg:#BB9AF7"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[swift]
symbol = " "
style = "bold fg:#FF9E64"
format = "[via $symbol$version]($style) "
version_format = "v${raw}"

[custom.flutter]
command = "flutter --version | head -n 1 | sed -E 's/^Flutter ([0-9.]+).*/v\\1/'"
when = "command -v flutter >/dev/null 2>&1 && [ -f pubspec.yaml ] && grep -q 'sdk:[[:space:]]*flutter' pubspec.yaml"
format = "[via  $output]($style) "
style = "bold fg:#7DCFFF"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold yellow"
