"$schema" = 'https://starship.rs/config-schema.json'

# ═══════════════════════════════════════════════════════════════════════════
# PROMPT DESIGN — COLOR PALETTE
# ═══════════════════════════════════════════════════════════════════════════
#   #313244  dark blue-gray  →  path pill bg · git status/metrics bg
#   #45475a  mid  blue-gray  →  git branch pill bg · worktree pill bg
#   Terminal bg             →  implicit; gaps between pills
#
# POWERLINE CHEVRON CHAIN  (left → right, always one line)
# ═══════════════════════════════════════════════════════════════════════════
# Each "" (U+E0B0) chevron uses:
#   fg = colour of the segment being LEFT
#   bg = colour of the segment being ENTERED
# This creates a seamless solid-arrow transition.
#
#  [󰉋 path  bg:#313244]
#    └─ custom.path_to_git   ▶  fg:#313244 bg:#45475a   (git repos only)
#  [󰙅 worktree  bg:#45475a]                             (linked worktrees only;
#  [ branch    bg:#45475a]                              shares pill with branch)
#    ├─ CLEAN repo:
#    │    └─ custom.tail_branch   ▶  fg:#45475a         (prompt end)
#    └─ DIRTY repo:
#         └─ custom.git_to_status ▶  fg:#45475a bg:#313244
#  [ 󰈚 status   bg:#313244]
#  [+N -N metrics  bg:#313244]
#         └─ custom.tail_standard ▶  fg:#313244         (prompt end)
#
#  Outside git entirely:
#  [󰉋 path  bg:#313244]
#         └─ custom.tail_standard ▶  fg:#313244         (prompt end)
#
# WHY SEPARATE CONNECTOR MODULES?
#   Starship has no conditional at the format level — you cannot pick a
#   different arrow colour based on what the previous module rendered.
#   Each connector module encodes ONE specific colour transition and uses
#   a `when` shell guard to appear only in the appropriate state.
#   The `command` always echoes the U+E0B0 glyph; `style` supplies fg/bg.
# ═══════════════════════════════════════════════════════════════════════════

add_newline = true
# Worktree git calls can be slower; 5 s prevents modules from being dropped.
command_timeout = 5000

format = """
${custom.path}\
${custom.path_to_git}\
${custom.git_worktree}\
$git_branch\
${custom.git_to_status}\
$git_status\
$git_metrics\
${custom.tail_standard}\
${custom.tail_branch}\
$line_break\
$character"""

