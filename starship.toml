# format = "[$symbol]($style)$directory $git_branch $git_commit $git_state $all"   

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold fg:#A6E3A1)"
error_symbol = "[❯](bold fg:#F7768E)"
vimcmd_symbol = "[❮](bold fg:#E0AF68)"

[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "••/"
style = "bold fg:#00F5FF"
format = "[$path]($style) "
# Show a lock icon if the directory is read-only
read_only = " 󰌾"

[git_branch]
symbol = " "
truncation_length = 40
truncation_symbol = "..."
only_attached = false
always_show_remote = false
style = "bold fg:#FFFFFF bg:#C902E8"
format = "[](fg:#C902E8)[$symbol$branch]($style)[](fg:#C902E8) "

[custom.git_worktree]
command = '''n=$(basename "$(git rev-parse --git-dir 2>/dev/null)"); [ "$n" = ".git" ] || printf "[%s] " "$n"'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[$output]($style)"
style = "bold fg:#C0CAF5"

[git_status]
style = "bold fg:#F28FAD"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡$count"
behind = "⇣$count"

[custom.git_context]
command = """
  MAIN=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/ {print $2; exit}')
  CURR=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$MAIN" ] && [ "$MAIN" != "$CURR" ] && basename "$MAIN"
"""
format = "[$symbol$output]($style) "
style = "bold blue dimmed"
symbol = " "
when = """
  MAIN=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/ {print $2; exit}')
  CURR=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$MAIN" ] && [ "$MAIN" != "$CURR" ]
"""

[git_metrics]
disabled = false
added_style = "bold fg:#8BD5A0"
deleted_style = "bold fg:#F7768E"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[custom.git_user]
command = "git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ $output]($style)"
style = "bold fg:#D7DBE8"

[cmd_duration]
min_time = 1
style = "bold fg:green"
format = "[◷$duration]($style) "


[dart]
symbol = " "
style = "bold fg:#7DCFFF"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[golang]
symbol = " "
style = "bold fg:#7DCFFF"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[rust]
symbol = " "
style = "bold fg:#E0AF68"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[java]
symbol = " "
style = "bold fg:#F7768E"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[php]
symbol = " "
style = "bold fg:#C0CAF5"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[kotlin]
symbol = " "
style = "bold fg:#BB9AF7"
format = "[$symbol$version]($style) "
version_format = "kot${raw}"

[swift]
symbol = ""
style = "bold fg:#FF9E64"
format = "[$symbol$version]($style) "
version_format = "${raw}"

[custom.flutter]
command = "flutter --version | head -n 1 | sed -E 's/^Flutter ([0-9.]+).*/v\\1/'"
when = "command -v flutter >/dev/null 2>&1 && [ -f pubspec.yaml ] && grep -q 'sdk:[[:space:]]*flutter' pubspec.yaml"
format = "[ $output]($style) "
style = "bold fg:#7DCFFF"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold yellow"
