[custom.flutter]
command = "flutter --version | head -n 1 | sed -E 's/^Flutter ([0-9.]+).*/v\\1/'"
when = "command -v flutter >/dev/null 2>&1 && [ -f pubspec.yaml ] && grep -q 'sdk:[[:space:]]*flutter' pubspec.yaml"
format = "[ $output]($style) "
style = "fg:#7DCFFF"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "fg:#FFD580"
