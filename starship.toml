# format = "[$symbol]($style)$directory $git_branch $git_commit $git_state $all"   

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold fg:#A6E3A1)"
error_symbol = "[❯](bold fg:#F7768E)"
vimcmd_symbol = "[❮](bold fg:#E0AF68)"

[git_commit]
commit_hash_length = 7
format = '[$symbol  $hash]($style) '
style = 'red'
only_detached = true
tag_disabled = false
tag_max_candidates = 0
tag_symbol = ' 🏷 '


[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold fg:green"
version_format = "${raw}"


[custom.path]
when = "true"
style = "bold fg:#89dceb bg:#313244"
command = '''
p=${PWD/#$HOME/\~}
if [[ $p == "/" ]]; then
  printf "/"
  exit
fi
a=("${(@s:/:)p}")
n=${#a}
if (( n > 3 )); then
  pre="••/"
  start=$(( n - 2 ))
else
  pre=""
  start=1
fi
out=""
for (( i = start; i <= n; i++ )); do
  s=${a[$i]}
  if (( ${#s} > 16)); then 
    s="${s:0:6}..${s: -6}"
  fi
  out+="${s}/"
done
[[ ! -w . ]] && ro=" 󰌾"
printf "%s" "${pre}${out%/}${ro}"
'''
format = "[󰉋 $output ]($style)"
# Chevron that transitions path pill (#313244) → git pill (#45475a).
# Only appears inside a git repo.  The command echoes the U+E0B0 powerline
# right-arrow glyph; the style paints it with the correct transition colours.
[custom.path_to_git]
command = "echo ''"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "fg:#313244 bg:#45475a"
format = "[$output]($style)"
# Chevron that transitions git pill (#45475a) → status pill (#313244).
# Only appears when the repo is dirty (has staged/unstaged/untracked changes
# or uncommitted line diffs) so it doesn't render for clean repos.
[custom.git_to_status]
command = "echo ''"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && (git status --porcelain | grep -q . || git diff --shortstat 2>/dev/null | grep -q .)"
style = "fg:#45475a bg:#313244"
format = "([$output]($style))"

# Closing chevron after the status/metrics pill (#313244 → terminal bg).
# Fires whenever the last visible pill is the dark status block — i.e.,
# outside git entirely, OR inside git but the repo is dirty.
[custom.tail_standard]
command = "echo ''"
when = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1 || git status --porcelain | grep -q . || git diff --shortstat 2>/dev/null | grep -q ."
style = "fg:#313244"
format = "[$output]($style)"

# Closing chevron after the branch pill (#45475a → terminal bg).
# Fires only when inside a clean git repo — the branch is the last pill and
# needs an arrow in its own colour (#45475a) to look correct.
[custom.tail_branch]
command = "echo ''"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && ! git status --porcelain | grep -q . && ! git diff --shortstat 2>/dev/null | grep -q ."
style = "fg:#45475a"
format = "[$output]($style)"

[git_branch]
symbol = " "
truncation_length = 24
truncation_symbol = "..."
style = "fg:#a6e3a1 bg:#45475a"
format = "[ $symbol$branch ]($style)"

# ─── Linked-worktree indicator ───────────────────────────────────────────
# Shown ONLY when inside a linked worktree — never in the main checkout.
#
# Detection: compares the main worktree path (first entry of `git worktree
# list --porcelain`) with the current toplevel.  This is more reliable than
# the old `basename $(git rev-parse --git-dir)` heuristic, which broke on
# repos where the git-dir path did not end with the worktree name.
#
# IMPORTANT — bg:#45475a keeps this segment in the same visual pill as
# git_branch.  Without a matching background the colour chain ruptures
# and the path→git transition chevron paints onto the terminal background.
# fg:#FFD580 (amber) makes the worktree name pop against the green branch
# text that immediately follows it inside the same pill.
[custom.git_worktree]
command = '''
  main=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/{print $2; exit}')
  curr=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -z "$main" ] || [ "$main" = "$curr" ] && exit 0
  printf "%s" "$(basename "$curr")"
'''
when = '''
  main=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/{print $2; exit}')
  curr=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$main" ] && [ -n "$curr" ] && [ "$main" != "$curr" ]
'''
format = "[ 󰙅 $output ]($style)"
style = "fg:#e0ff02 bg:#45475a"

[git_status]
style = "bg:#313244"
format = "([ 󰈚 $all_status$ahead_behind  ]($style))"
conflicted = "[=](fg:#f38ba8 bg:#313244)"
ahead = "[⇡](fg:#fab387 bg:#313244)"
behind = "[⇣](fg:#fab387 bg:#313244)"
diverged = "[⇕](fg:#fab387 bg:#313244)"
up_to_date = ""
stashed = ""
deleted = "[✘$count](fg:#f38ba8 bg:#313244)"
modified = "[ $count](fg:#89b4fa bg:#313244)"
untracked = "[ ?$count](fg:#a6e3a1 bg:#313244)"
staged = "[ +$count](fg:#a6e3a1 bg:#313244)"
renamed = "[ »$count](fg:#f9e2af bg:#313244)"

# custom.git_context removed — its logic is fully covered by
# custom.git_worktree, which is the single authoritative worktree indicator.

[git_metrics]
disabled = false
added_style = "fg:#a6e3a1 bg:#313244"
deleted_style = "fg:#f38ba8 bg:#313244"
only_nonzero_diffs = true
format = "([+$added]($added_style)[-$deleted ]($deleted_style))"

[custom.git_user]
command = "git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ $output]($style)"
style = "fg:#D7DBE8"

[cmd_duration]
min_time = 1
style = "bold fg:green"
format = "[◷$duration]($style) "


[dart]
symbol = " "
style = "fg:#7DCFFF"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

