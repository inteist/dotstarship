"$schema" = 'https://starship.rs/config-schema.json'

# Insert a blank line between shell prompts
add_newline = false
# Give git modules more time in large repos/worktrees.
command_timeout = 5000

# Prompt layout modeled after screenshot:
# line 1: path + branch + git state (left), duration + node (right)
# line 2: git identity on the right
# line 3: prompt character
format = """
${custom.git_context}\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$nodejs\
$python\
$ruby\
${custom.flutter}\
$dart\
$golang\
$rust\
$java\
$php\
$kotlin\
$swift\
${custom.git_user}\
$line_break\
$character"""

# format = "[$symbol]($style)  $directory $git_branch $git_commit $git_state $all"   

[fill]
symbol = " "

[character]
success_symbol = "[â‌¯](bold fg:#A6E3A1)"
error_symbol = "[â‌¯](bold fg:#F7768E)"
vimcmd_symbol = "[â‌®](bold fg:#E0AF68)"

[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = ".../"
style = "bold fg:#00F5FF"
format = "[$path]($style) "
# Show a lock icon if the directory is read-only
read_only = " َ°Œ¾"

[git_branch]
symbol = "îœ¥ "
truncation_length = 24
truncation_symbol = "..."
only_attached = false
always_show_remote = false
style = "bold fg:#FFFFFF bg:#8A2BE2"
format = "[î‚¶](fg:#8A2BE2)[$symbol$branch]($style)[î‚´](fg:#8A2BE2) "

[custom.git_worktree]
command = '''n=$(basename "$(git rev-parse --git-dir 2>/dev/null)"); [ "$n" = ".git" ] || printf "[%s] " "$n"'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[$output]($style)"
style = "bold fg:#C0CAF5"

[git_status]
style = "bold fg:#F28FAD"
format = "([$all_status$ahead_behind]($style) )"
ahead = "â‡،$count"
behind = "â‡£$count"

[custom.git_context]
command = """
  MAIN=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/ {print $2; exit}')
  CURR=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$MAIN" ] && [ "$MAIN" != "$CURR" ] && basename "$MAIN"
"""
format = "[$symbol$output]($style) "
style = "bold blue dimmed"
symbol = "ï“‌ "
when = """
  MAIN=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/ {print $2; exit}')
  CURR=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$MAIN" ] && [ "$MAIN" != "$CURR" ]
"""   

[git_metrics]
disabled = false
added_style = "bold fg:#8BD5A0"
deleted_style = "bold fg:#F7768E"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[custom.git_user]
command = "git config user.email | sed 's/\\.git_user$//' || git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ï‚› $output]($style)"
style = "bold fg:#D7DBE8"

[cmd_duration]
min_time = 1
style = "bold fg:#D7DBE8"
format = "[â—·$duration]($style) "

[nodejs]
symbol = "îœک "
format = "[$symbol$version]($style) "
style = "bold fg:#E6D489"
version_format = "v${raw}"

[python]
symbol = "îک† "
style = "bold fg:#8BD5A0"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[ruby]
symbol = "î‍‘ "
style = "bold fg:#F7768E"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[dart]
symbol = "îںچ "
style = "bold fg:#7DCFFF"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[golang]
symbol = "îک§ "
style = "bold fg:#7DCFFF"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[rust]
symbol = "î‍¨ "
style = "bold fg:#E0AF68"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[java]
symbol = "î‰– "
style = "bold fg:#F7768E"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[php]
symbol = "îکˆ "
style = "bold fg:#C0CAF5"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[kotlin]
symbol = "îک´ "
style = "bold fg:#BB9AF7"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[swift]
symbol = "î‌• "
style = "bold fg:#FF9E64"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[custom.flutter]
command = "flutter --version | head -n 1 | sed -E 's/^Flutter ([0-9.]+).*/v\\1/'"
when = "command -v flutter >/dev/null 2>&1 && [ -f pubspec.yaml ] && grep -q 'sdk:[[:space:]]*flutter' pubspec.yaml"
format = "[îںچ $output]($style) "
style = "bold fg:#7DCFFF"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold yellow"
