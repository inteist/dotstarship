"$schema" = 'https://starship.rs/config-schema.json'

# Insert a blank line between shell prompts
add_newline = false
# Give git modules more time in large repos/worktrees.
command_timeout = 5000

# Prompt layout modeled after screenshot:
# line 1: path + branch + git state (left), duration + node (right)
# line 2: git identity on the right
# line 3: prompt character
format = """
${custom.git_context}\
$username\
$directory\
$git_branch\
$git_status\
$git_metrics\
$git_commit\

$fill\
$cmd_duration\

$python\
${custom.flutter}\
$golang\
$rust\
$java\
$php\
$kotlin\
$swift\
${custom.git_user}\
$line_break\
$character"""


# $fill\
# $dart\

# $ruby\

[git_commit]
commit_hash_length = 7
format = '[$symbol  $hash]($style) '
style = 'bold red'
only_detached = true
tag_disabled = false
tag_max_candidates = 0
tag_symbol = ' 🏷 '


[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold fg:green"
version_format = "${raw}"


