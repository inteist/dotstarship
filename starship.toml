"$schema" = 'https://starship.rs/config-schema.json'

# ── Global ────────────────────────────────────────────────────────────────────
add_newline = true
command_timeout = 2000
palette = "catppuccin_macchiato"

# ── Layout ────────────────────────────────────────────────────────────────────
# Line 1: context (where you are, what branch, any git noise)
# Line 2: the prompt character
format = """
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$nodejs\
$python\
$rust\
$golang\
$custom.git_config_email\
$line_break\
$character"""

# ── Core ──────────────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

[fill]
symbol = " "

[line_break]
disabled = false

# ── Directory ─────────────────────────────────────────────────────────────────

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold blue"
read_only         = " 󰌾"
read_only_style   = "red"
format            = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────────────────────

[git_branch]
symbol = " "
style  = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "bold yellow"
format    = "([$all_status$ahead_behind]($style) )"
ahead     = "⇡$count"
behind    = "⇣$count"
diverged  = "⇕⇡$ahead_count⇣$behind_count"
conflicted = "="
untracked = "?"
stashed   = "$"
modified  = "!"
staged    = "+"
renamed   = "»"
deleted   = "✘"

[git_metrics]
disabled           = true   # flip to false if you want +N/-N line counts

# ── Right-side info ───────────────────────────────────────────────────────────

[cmd_duration]
min_time = 2_000
format   = "[$duration]($style) "
style    = "overlay1"

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style  = "green"

[python]
symbol = " "
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
style  = "yellow"

[rust]
symbol = " "
format = "[$symbol$version]($style) "
style  = "peach"

[golang]
symbol = " "
format = "[$symbol$version]($style) "
style  = "sky"

# ── Noise suppression ─────────────────────────────────────────────────────────

[package]
disabled = true

[battery]
disabled = true

# ── Hostname (SSH only) ───────────────────────────────────────────────────────

[hostname]
ssh_only = true
format   = "[$hostname]($style) in "
style    = "bold yellow"

# ── Custom: git email (right side, subtle) ────────────────────────────────────

[custom.git_config_email]
description = "Current git user.email"
command     = "git config user.email"
when        = "git rev-parse --is-inside-work-tree 2>/dev/null"
format      = "[$output]($style) "
style       = "overlay1"

# ── Catppuccin Macchiato palette ──────────────────────────────────────────────

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo  = "#f0c6c6"
pink      = "#f5bde6"
mauve     = "#c6a0f6"
red       = "#ed8796"
maroon    = "#ee99a0"
peach     = "#f5a97f"
yellow    = "#eed49f"
green     = "#a6da95"
teal      = "#8bd5ca"
sky       = "#91d7e3"
sapphire  = "#7dc4e4"
blue      = "#8aadf4"
lavender  = "#b7bdf8"
text      = "#cad3f5"
subtext1  = "#b8c0e0"
subtext0  = "#a5adcb"
overlay2  = "#939ab7"
overlay1  = "#8087a2"
overlay0  = "#6e738d"
surface2  = "#5b6078"
surface1  = "#494d64"
surface0  = "#363a4f"
base      = "#24273a"
mantle    = "#1e2030"
crust     = "#181926"
