[fill]
symbol = " "

[character]
success_symbol = "[вқҜ](bold fg:#A6E3A1)"
error_symbol = "[вқҜ](bold fg:#F7768E)"
vimcmd_symbol = "[вқ®](bold fg:#E0AF68)"

[git_commit]
commit_hash_length = 7
format = '[$symbol  $hash]($style) '
style = 'red'
only_detached = true
tag_disabled = false
tag_max_candidates = 0
tag_symbol = ' рҹҸ· '


[nodejs]
symbol = "оңҳ "
format = "[$symbol$version]($style) "
style = "bold fg:green"
version_format = "${raw}"


[custom.path]
when = "true"
style = "bold fg:#89dceb bg:#313244"
command = '''
p=${PWD/#$HOME/\~}
if [[ $p == "/" ]]; then
  printf "/"
  exit
fi
a=("${(@s:/:)p}")
n=${#a}
if (( n > 3 )); then
  pre="вҖўвҖў/"
  start=$(( n - 2 ))
else
  pre=""
  start=1
fi
out=""
for (( i = start; i <= n; i++ )); do
  s=${a[$i]}
  if (( ${#s} > 16)); then 
    s="${s:0:6}..${s: -6}"
  fi
  out+="${s}/"
done
[[ ! -w . ]] && ro=" у°Ңҫ"
printf "%s" "${pre}${out%/}${ro}"
'''
format = "[оӮІ](fg:#313244)[ у°үӢ $output ]($style)[оӮ°](fg:#313244)"

# Branch/worktree pill.  Ahead/behind lives here because it describes branch
# divergence, not file changes in the working tree.
[custom.git_meta]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
style = "bold fg:#a6e3a1 bg:#45475a"
command = '''
top=$(git rev-parse --show-toplevel 2>/dev/null) || exit 0
branch=$(git symbolic-ref --quiet --short HEAD 2>/dev/null)
if [[ -z $branch ]]; then
  branch=$(git rev-parse --short HEAD 2>/dev/null) || exit 0
fi
if (( ${#branch} > 24 )); then
  branch="${branch:0:21}..."
fi

out=""
main=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/{print $2; exit}')
if [[ -n $main && $main != $top ]]; then
  out+="у°ҷ… ${top:t}  "
fi

out+="оңҘ ${branch}"

header=$(git status -sb 2>/dev/null | head -1)
ahead=$(printf "%s\n" "$header" | grep -oE 'ahead [0-9]+' | awk '{print $2}')
behind=$(printf "%s\n" "$header" | grep -oE 'behind [0-9]+' | awk '{print $2}')

[[ -n $ahead ]] && out+="  п…Ҳ${ahead}"
[[ -n $behind ]] && out+="  п…ү${behind}"

printf "%s" "$out"
'''
format = " [оӮІ](fg:#45475a)[ $output ]($style)[оӮ°](fg:#45475a)"

[git_status]
style = "bg:#313244"
# File-status pill only.  Remote divergence moved into custom.git_meta.
format = "( [оӮІ](fg:#313244)[ у°Ҳҡ$all_status ]($style)[оӮ°](fg:#313244))"
conflicted = "[ =$count](fg:#f38ba8 bg:#313244)"
ahead = ""
behind = ""
diverged = ""
up_to_date = ""
stashed = ""
deleted = "[ вңҳ$count](fg:#f38ba8 bg:#313244)"
modified = "[ ~$count](fg:#89b4fa bg:#313244)"
untracked = "[ ?$count](fg:#a6e3a1 bg:#313244)"
staged = "[ +$count](fg:#a6e3a1 bg:#313244)"
renamed = "[ В»$count](fg:#f9e2af bg:#313244)"

[git_metrics]
disabled = false
added_style = "fg:#a6e3a1 bg:#313244"
deleted_style = "fg:#f38ba8 bg:#313244"
only_nonzero_diffs = true
format = "( [оӮІ](fg:#313244)[ +$added]($added_style)[ -$deleted ]($deleted_style)[оӮ°](fg:#313244))"

[custom.git_user]
command = "git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[пӮӣ $output]($style)"
style = "fg:#D7DBE8"

[cmd_duration]
min_time = 1
style = "bold fg:green"
format = "[в—·$duration]($style) "


