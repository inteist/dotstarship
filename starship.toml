"$schema" = 'https://starship.rs/config-schema.json'

# Insert a blank line between shell prompts
add_newline = false

# Prompt layout modeled after screenshot:
# line 1: path + branch + git state (left), duration + node (right)
# line 2: git identity on the right
# line 3: prompt character
format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$cmd_duration\
$nodejs\
$line_break\
$fill\
$custom.git_user\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold fg:#A6E3A1) [│](fg:#7AA2F7)"
error_symbol = "[❯](bold fg:#F7768E) [│](fg:#7AA2F7)"
vimcmd_symbol = "[❮](bold fg:#E0AF68) [│](fg:#7AA2F7)"

[directory]
truncation_length = 8
truncate_to_repo = true
style = "bold fg:#DCE6FF bg:#4A7DE8"
format = "[ $path ]($style)"
# Show a lock icon if the directory is read-only
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold fg:#1E2233 bg:#F2E58A"
format = "[](fg:#4A7DE8 bg:#F2E58A)[ $symbol$branch ]($style)[](fg:#F2E58A) "

[git_status]
style = "bold fg:#F28FAD"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡$count"
behind = "⇣$count"

[git_metrics]
disabled = false
added_style = "bold fg:#8BD5A0"
deleted_style = "bold fg:#F7768E"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[custom.git_user]
command = "git config user.email || git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ $output]($style)"
style = "bold fg:#D7DBE8"

[fill]
symbol = " "

[cmd_duration]
min_time = 1
style = "bold fg:#D7DBE8"
format = "[◷ $duration]($style) "

[nodejs]
symbol = "⬢ "
format = "[via $symbol$version]($style)"
style = "bold fg:#E6D489"
version_format = "v${raw}"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold yellow"
