# format = "[$symbol]($style)$directory $git_branch $git_commit $git_state $all"   

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold fg:#A6E3A1)"
error_symbol = "[❯](bold fg:#F7768E)"
vimcmd_symbol = "[❮](bold fg:#E0AF68)"

[custom.path]
when = "true"
style = "bold fg:#89dceb bg:#313244"
command = '''
p=${PWD/#$HOME/\~}
if [[ $p == "/" ]]; then
  printf "/"
  exit
fi
a=("${(@s:/:)p}")
n=${#a}
if (( n > 3 )); then
  pre="••/"
  start=$(( n - 2 ))
else
  pre=""
  start=1
fi
out=""
for (( i = start; i <= n; i++ )); do
  s=${a[$i]}
  if (( ${#s} > 14 )); then
    s="${s:0:5}...${s: -5}"
  fi
  out+="${s}/"
done
[[ ! -w . ]] && ro=" 󰌾"
printf "%s" "${pre}${out%/}${ro}"
'''
format = "[ 󰉋 $output ]($style)[](fg:#313244 bg:#45475a)"

[git_branch]
symbol = " "
truncation_length = 24
truncation_symbol = "..."
style = "bold fg:#a6e3a1 bg:#45475a"
format = "[ $symbol$branch ]($style)[](fg:#45475a bg:#313244)"

[custom.git_worktree]
command = '''n=$(basename "$(git rev-parse --git-dir 2>/dev/null)"); [ "$n" = ".git" ] || printf "[%s] " "$n"'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[$output]($style)"
style = "bold fg:#C0CAF5"

[git_status]
style = "bg:#313244"
format = "[ 󰈚 $all_status$ahead_behind ]($style)"
conflicted = "[=](fg:#f38ba8 bg:#313244)"
ahead = "[⇡](fg:#fab387 bg:#313244)"
behind = "[⇣](fg:#fab387 bg:#313244)"
diverged = "[⇕](fg:#fab387 bg:#313244)"
up_to_date = ""
stashed = ""
deleted = "[✘$count](fg:#f38ba8 bg:#313244)"
modified = "[!$count](fg:#89b4fa bg:#313244)"
untracked = "[?$count](fg:#a6e3a1 bg:#313244)"
staged = "[+$count](fg:#a6e3a1 bg:#313244)"
renamed = "[ »$count](fg:#f9e2af bg:#313244)"

[custom.git_context]
command = """
  MAIN=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/ {print $2; exit}')
  CURR=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$MAIN" ] && [ "$MAIN" != "$CURR" ] && basename "$MAIN"
"""
format = "[$symbol$output]($style) "
style = "bold blue dimmed"
symbol = " "
when = """
  MAIN=$(git worktree list --porcelain 2>/dev/null | awk '/^worktree/ {print $2; exit}')
  CURR=$(git rev-parse --show-toplevel 2>/dev/null)
  [ -n "$MAIN" ] && [ "$MAIN" != "$CURR" ]
"""

[git_metrics]
disabled = false
added_style = "bold fg:#a6e3a1 bg:#313244"
deleted_style = "bold fg:#f38ba8 bg:#313244"
format = "[+$added]($added_style)[•](fg:#9399b2 bg:#313244)[-$deleted]($deleted_style)[](fg:#313244) "

[custom.git_user]
command = "git config user.name"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "[ $output]($style)"
style = "bold fg:#D7DBE8"

[cmd_duration]
min_time = 1
style = "bold fg:green"
format = "[◷$duration]($style) "


[dart]
symbol = " "
style = "bold fg:#7DCFFF"
format = "[$symbol$version]($style) "
version_format = "v${raw}"

[golang]
