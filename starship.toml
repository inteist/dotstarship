# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# PROMPT DESIGN вҖ” COLOR PALETTE
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
#   #313244  dark blue-gray  вҶ’  path pill bg В· git status/metrics bg
#   #45475a  mid  blue-gray  вҶ’  git branch pill bg В· worktree pill bg
#   Terminal bg             вҶ’  implicit; gaps between pills
#
# SELF-CONTAINED PILLS  (left вҶ’ right, always one line)
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# Each visible block is visually complete on its own:
#   transparent start chevron  +  coloured body  +  coloured end chevron
#   [оӮІ](fg:<bg>)               [ ... ](bg:<bg>)   [оӮ°](fg:<bg>)
#
# That means prompt state only decides WHETHER a pill exists, not how the
# neighbouring pills must close.  No transition/tail connector modules are
# needed anymore.
#
#  [оӮІ у°үӢ path                  оӮ°]  bg:#313244
#  [оӮІ у°ҷ… worktree  оңҘ branch п…Ҳ2 оӮ°]  bg:#45475a
#  [оӮІ у°Ҳҡ +1 ~2 ?1             оӮ°]  bg:#313244
#  [оӮІ +80 -15                 оӮ°]  bg:#313244
#
# WHY `git status -sb | head -1`?
#   Ahead/behind belongs to the branch pill, not file status.  The header
#   line of `git status -sb` is the cheapest reliable place to extract the
#   divergence counts without adding separate `git rev-list` plumbing.
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

