# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# PROMPT DESIGN вҖ” COLOR PALETTE
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
#   #313244  dark blue-gray  вҶ’  path pill bg В· git status/metrics bg
#   #45475a  mid  blue-gray  вҶ’  git branch pill bg В· worktree pill bg
#   Terminal bg             вҶ’  implicit; gaps between pills
#
# OVERLAPPING CHEVRON CHAIN  (left вҶ’ right, always one line)
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# Robustness comes from modelling the prompt as ordered color zones, not as
# independent pills.  A zone may contain one or more modules that share the
# same background, and only the ZONE boundaries get chevrons.
#
# Current zones:
#   1. path        bg:#313244   always visible
#   2. git meta    bg:#45475a   visible inside a git worktree
#   3. git changes bg:#313244   visible when file-status OR line metrics exist
#
# This avoids the earlier connector explosion: the prompt only needs to know
# whether the git-meta zone exists and whether the git-changes zone exists.
# Order is fixed, visibility is dynamic, and every state reduces to one of:
#
#   no git:         [path] вҶ’ tail_dark
#   clean git:      [path] вҶ’ [git meta] вҶ’ tail_git
#   dirty git:      [path] вҶ’ [git meta] вҶ’ [git changes] вҶ’ tail_dark
#
# Ahead/behind belongs to git meta, so remote divergence never affects the
# dark git-changes zone visibility.
#
# WHY `git status -sb | head -1`?
#   Ahead/behind belongs to the branch section, not file status.  The header
#   line of `git status -sb` is the cheapest reliable place to extract the
#   divergence counts without adding separate `git rev-list` plumbing.
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

add_newline = true
# Worktree git calls can be slower; 5 s prevents modules from being dropped.
command_timeout = 5000

format = """
${custom.path}\
${custom.path_to_git}\
${custom.git_meta}\
${custom.git_to_changes}\
$git_status\
$git_metrics\
${custom.tail_dark}\
${custom.tail_git}\
$line_break\
$character"""

